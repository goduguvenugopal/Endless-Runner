<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexka Runner Web Game</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Vexka Runner: A high-speed neon-themed endless runner game. Experience fluid animations and competitive leaderboards.">
    <meta name="keywords" content="Vexka Runner, Endless Runner, Web Game, JavaScript Game, HTML5 Canvas, Neon Game">
    <meta name="author" content="Vexka Games">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="./">
    <meta property="og:title" content="Vexka Runner Web Game">
    <meta property="og:description" content="Experience high-performance neon gaming in your browser. Run, jump, and climb the leaderboard!">
    <meta property="og:image" content="assets/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="./">
    <meta property="twitter:title" content="Vexka Runner Web Game">
    <meta property="twitter:description" content="Experience high-performance neon gaming in your browser. Run, jump, and climb the leaderboard!">
    <meta property="twitter:image" content="assets/logo.png">

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/logo.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050510">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="gameWrapper">
        <!-- Audio Elements (Local Assets) -->
        <audio id="bg-music" loop>
            <source src="assets/bg-song.mp3" type="audio/mpeg">
        </audio>
        <audio id="start-sound">
            <source src="assets/start-stop-game.wav" type="audio/wav">
        </audio>
        <audio id="gameover-sound">
            <source src="assets/game-over.wav" type="audio/wav">
        </audio>
        <audio id="jump-sound">
            <source src="assets/jumping-sound.wav" type="audio/wav">
        </audio>

        <nav id="navbar">
            <div class="logo">VEXKA RUNNER</div>
            <div class="nav-links">
                <button id="leaderboard-btn">🏆 RANKINGS</button>
            </div>
        </nav>
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div id="ui-overlay">
                <div id="score-card">SCORE: <span id="score-value">0</span></div>
                <div id="pause-container">
                    <button id="pause-btn">PAUSE</button>
                </div>
                <div id="high-score-card">BEST: <span id="high-score-value">0</span></div>
            </div>
            <!-- Pause Modal -->
            <div id="pauseModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h1>PAUSED</h1>
                    <button id="resume-btn">RESUME</button>
                    <p class="hint">Press P to Resume</p>
                </div>
            </div>
            <!-- Leaderboard Modal -->
            <div id="leaderboardModal" class="modal" style="display: none;">
                <div class="modal-content leaderboard">
                    <h1>LEADERBOARD</h1>
                    <ul id="leaderboard-list"></ul>
                    <button class="close-btn">CLOSE</button>
                </div>
            </div>
            <div id="gameOver" class="modal" style="display: none;">
                <div class="modal-content">
                    <h1>MISSION FAILED</h1>
                    <div class="final-score">SCORE: <span id="final-score-value">0</span></div>
                    <button id="restart-btn">RUN AGAIN</button>
                    <p class="hint">Tap or Press Space to Restart</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
