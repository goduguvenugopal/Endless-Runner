<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavex Runner Web Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameWrapper">
        <!-- Audio Elements (Local Assets) -->
        <audio id="bg-music" loop>
            <source src="assets/bg-song.mp3" type="audio/mpeg">
        </audio>
        <audio id="start-sound">
            <source src="assets/start-stop-game.wav" type="audio/wav">
        </audio>
        <audio id="gameover-sound">
            <source src="assets/game-over.wav" type="audio/wav">
        </audio>
        <audio id="jump-sound">
            <source src="assets/jumping-sound.wav" type="audio/wav">
        </audio>

        <nav id="navbar">
            <div class="logo">KAVEX RUNNER</div>
            <div class="nav-links">
                <button id="leaderboard-btn">🏆 RANKINGS</button>
            </div>
        </nav>
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div id="ui-overlay">
                <div id="score-card">SCORE: <span id="score-value">0</span></div>
                <div id="pause-container">
                    <button id="pause-btn">PAUSE</button>
                </div>
                <div id="high-score-card">BEST: <span id="high-score-value">0</span></div>
            </div>
            <!-- Pause Modal -->
            <div id="pauseModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h1>PAUSED</h1>
                    <button id="resume-btn">RESUME</button>
                    <p class="hint">Press P to Resume</p>
                </div>
            </div>
            <!-- Leaderboard Modal -->
            <div id="leaderboardModal" class="modal" style="display: none;">
                <div class="modal-content leaderboard">
                    <h1>LEADERBOARD</h1>
                    <ul id="leaderboard-list"></ul>
                    <button class="close-btn">CLOSE</button>
                </div>
            </div>
            <div id="gameOver" class="modal" style="display: none;">
                <div class="modal-content">
                    <h1>MISSION FAILED</h1>
                    <div class="final-score">SCORE: <span id="final-score-value">0</span></div>
                    <button id="restart-btn">RUN AGAIN</button>
                    <p class="hint">Tap or Press Space to Restart</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
